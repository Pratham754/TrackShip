<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="landing.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <title>TrackShip - Your Logistics and Delivery Tracking Portal</title>
</head>

<body>
    <nav class="navbar bg-body-tertiary d-flex justify-content-between">
        <div class="container-fluid">
            <a class="navbar-brand">TrackShip</a>
            <div class="d-flex align-items-center ms-auto">
                <i class="bi bi-telephone-inbound" style="width: 22px; height: 22px; scale: 1.5;"></i>
                <span class="navbar-text me-3">
                    <a href="tel:+911234567890" style="text-decoration: none;">+91 1234567890</a>
                </span>

                <div class="dropdown">
                    <button class="btn btn-outline-success dropdown-toggle" type="button" id="dropdownMenuButton"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        Sign In
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                        <li>
                            <a class="dropdown-item" data-bs-toggle="collapse" href="#businessLogin" role="button"
                                aria-expanded="false" aria-controls="businessLogin">Business Login</a>
                            <div class="collapse" id="businessLogin">
                                <form>
                                    <div class="mb-3">
                                        <label for="businessUsername" class="form-label">Username</label>
                                        <input type="text" class="form-control" id="businessUsername" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="businessPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="businessPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Login</button>
                                    <div class="mt-2">
                                        <a href="#">Forgot Password</a> | <a href="#">Create Account</a>
                                    </div>
                                </form>
                            </div>
                        </li>
                        <li>
                            <a class="dropdown-item" data-bs-toggle="collapse" href="#personalLogin" role="button"
                                aria-expanded="false" aria-controls="personalLogin">Personal Login</a>
                            <div class="collapse" id="personalLogin">
                                <form>
                                    <div class="mb-3">
                                        <label for="mobileNumber" class="form-label">Mobile Number</label>
                                        <input type="text" class="form-control" id="mobileNumber" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="otp" class="form-label">OTP</label>
                                        <input type="text" class="form-control" id="otp" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Login</button>
                                    <div class="mt-2">
                                        <a href="#">Forgot Password</a> | <a href="#">Create Account</a>
                                    </div>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <h2 style="text-align: center;">Track Shipment</h2>
        <form action="http://127.0.0.1:3000/loggedin" method="post">

            <div class="mb-3">
                <label for="trackingNumber" class="form-label">Enter Tracking Number</label>
                <input type="text" class="form-control" id="trackingNumber" name="trackingNumber" required>
            </div> <br>

            <div class="mb-3">
                <div class="g-recaptcha" data-sitekey="6LePtu0qAAAAAFiPBU-mmQddOM3swvOPSf651oya"></div>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

    <script>
        const businessLogin = document.getElementById('businessLogin');
        const personalLogin = document.getElementById('personalLogin');

        document.querySelector('[href="#businessLogin"]').addEventListener('click', function () {
            if (personalLogin.classList.contains('show')) {
                new bootstrap.Collapse(personalLogin, { toggle: true });
            }
        });

        document.querySelector('[href="#personalLogin"]').addEventListener('click', function () {
            if (businessLogin.classList.contains('show')) {
                new bootstrap.Collapse(businessLogin, { toggle: true });
            }
        });

        const dropdownToggle = document.getElementById('dropdownMenuButton');
        dropdownToggle.addEventListener('click', function(event) {
            event.stopPropagation();
        });

        const dropdownItems = document.querySelectorAll('.dropdown-item');
        dropdownItems.forEach(function(item) {
            item.addEventListener('click', function(event) {
                event.stopPropagation();
            });
        });
    </script>
</body>

</html>
